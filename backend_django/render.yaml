services:
  - type: web
    name: hostelconnect-api
    env: python
    plan: free
    buildCommand: ./build.sh
    # Use ASGI server so WebSockets (Django Channels) work in production.
    startCommand: gunicorn hostelconnect.asgi:application -k uvicorn.workers.UvicornWorker --workers 2 --threads 2 --timeout 120 --keep-alive 5 --max-requests 500 --max-requests-jitter 50 --log-level warning --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health/
    envVars:
      - key: DEBUG
        value: false
      - key: RENDER
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: hostelconnect-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: ALLOWED_HOSTS
        value: "hostel.samuraitechpark.in,*.samuraitechpark.in,*.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://hostel.samuraitechpark.in"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://hostel.samuraitechpark.in,https://*.onrender.com"
      - key: FRONTEND_URL
        value: "https://hostel.samuraitechpark.in"
      - key: API_BASE_URL
        value: "https://hostel.samuraitechpark.in"

databases:
  - name: hostelconnect-db
    plan: free
    maxConnections: 3
    postgresMajorVersion: 14

envVarGroups:
  - name: Production
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@example.com
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true

  - type: web
    name: hostelconnect-web
    env: static
    plan: free
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://hostel.samuraitechpark.in/api
    headers:
      - path: /*
        name: Access-Control-Allow-Origin
        value: "*"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
