services:
  - type: web
    name: hostelconnect-api
    env: python
    plan: free
    buildCommand: ./build.sh
    # Use ASGI server so WebSockets (Django Channels) work in production.
    startCommand: daphne -b 0.0.0.0 -p $PORT hostelconnect.asgi:application
    healthCheckPath: /api/health/
    envVars:
      - key: DEBUG
        value: false
      - key: RENDER
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: hostelconnect-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: ALLOWED_HOSTS
        value: "*.render.com,yourdomain.com"

databases:
  - name: hostelconnect-db
    plan: free
    maxConnections: 3
    postgresMajorVersion: 14

envVarGroups:
  - name: Production
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@example.com
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true
