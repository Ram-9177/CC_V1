services:
  - type: web
    name: hostelconnect-api
    runtime: python
    plan: free
    buildCommand: ./build.sh
    # Use Daphne ASGI server with migrations at startup.
    startCommand: python manage.py migrate && daphne -b 0.0.0.0 -p $PORT hostelconnect.asgi:application
    healthCheckPath: /api/health/
    envVars:
      - key: DEBUG
        value: "false"
      - key: RENDER
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: hostelconnect-db
          property: connectionString
      - key: REDIS_URL
        sync: false
        value: rediss://default:gQAAAAAAARI9AAIncDFhYzA0NGRjNTc2NTQ0ZWJmYTAxNzRkOWM3OWMxMmM3NXAxNzAyMDU@fleet-opossum-70205.upstash.io:6379
      - key: UPSTASH_REDIS_REST_URL
        sync: false
        value: https://fleet-opossum-70205.upstash.io
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
        value: gQAAAAAAARI9AAIncDFhYzA0NGRjNTc2NTQ0ZWJmYTAxNzRkOWM3OWMxMmM3NXAxNzAyMDU
      - key: ALLOWED_HOSTS
        value: "hostel.samuraitechpark.in,*.samuraitechpark.in,*.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://hostel.samuraitechpark.in"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://hostel.samuraitechpark.in,https://*.onrender.com"
      - key: FRONTEND_URL
        value: "https://hostel.samuraitechpark.in"
      - key: API_BASE_URL
        value: "https://hostel.samuraitechpark.in"

databases:
  - name: hostelconnect-db
    plan: free
    postgresMajorVersion: "14"

envVarGroups:
  - name: Production
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@example.com
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true
