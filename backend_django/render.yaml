services:
  - type: web
    name: campuscore-api
    runtime: python
    plan: free
    buildCommand: ./build.sh
    preDeployCommand: python manage.py migrate
    # Use Gunicorn + Uvicorn worker for leaner cold starts on free tier.
    startCommand: gunicorn hostelconnect.asgi:application -k uvicorn.workers.UvicornWorker --workers 2 --threads 2 --timeout 60 --keep-alive 5 --max-requests 500 --max-requests-jitter 50 --log-level warning --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health/
    envVars:
      - key: DEBUG
        value: "false"
      - key: RENDER
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: campuscore-db
          property: connectionString
      - key: REDIS_URL
        sync: false
        value: rediss://default:gQAAAAAAARI9AAIncDFhYzA0NGRjNTc2NTQ0ZWJmYTAxNzRkOWM3OWMxMmM3NXAxNzAyMDU@fleet-opossum-70205.upstash.io:6379
      - key: DB_CONN_MAX_AGE
        value: "30"
      - key: DB_STATEMENT_TIMEOUT_MS
        value: "5000"
      - key: SLOW_QUERY_THRESHOLD_MS
        value: "700"
      - key: CHANNELS_CAPACITY
        value: "5000"
      - key: CACHE_VERSION
        value: "1"
      - key: USE_IN_MEMORY_CHANNEL_LAYER
        value: "false"
      - key: UPSTASH_REDIS_REST_URL
        sync: false
        value: https://fleet-opossum-70205.upstash.io
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
        value: gQAAAAAAARI9AAIncDFhYzA0NGRjNTc2NTQ0ZWJmYTAxNzRkOWM3OWMxMmM3NXAxNzAyMDU
      - key: ALLOWED_HOSTS
        value: "hostel.samuraitechpark.in,*.samuraitechpark.in,*.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://hostel.samuraitechpark.in"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://hostel.samuraitechpark.in,https://*.onrender.com"
      - key: FRONTEND_URL
        value: "https://hostel.samuraitechpark.in"
      - key: API_BASE_URL
        value: "https://hostel.samuraitechpark.in"

databases:
  - name: campuscore-db
    plan: free
    postgresMajorVersion: "14"

envVarGroups:
  - name: Production
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@example.com
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true
