<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline</title>
  <style>
    body{font-family:system-ui;background:#FFFDF1;color:#000000;display:flex;min-height:100vh;align-items:center;justify-content:center;margin:0}
    .card{max-width:420px;padding:24px;border-radius:16px;background:#fff;border:1px solid rgba(255,150,68,0.30);box-shadow:0 10px 30px rgba(0,0,0,0.12)}
    h1{margin:0 0 8px 0;font-size:20px}
    p{margin:0;color:rgba(0,0,0,0.72)}
  </style>
</head>
<body>
  <div class="card">
    <h1>You're offline</h1>
    <p>Reconnect to access live data. Cached content may still be available.</p>
  </div>

</html>
