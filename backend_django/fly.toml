app = "hostelconnect-api"
primary_region = "sin"

[build]

[env]
  PORT = "8000"
  DEBUG = "False"
  RENDER = "False"
  USE_SQLITE = "False"
  USE_IN_MEMORY_CHANNEL_LAYER = "False"
  DB_CONN_MAX_AGE = "60"
  USE_PGBOUNCER = "True"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/api/health/"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[processes]
  app = "python manage.py migrate --noinput && daphne -b 0.0.0.0 -p 8000 hostelconnect.asgi:application"
