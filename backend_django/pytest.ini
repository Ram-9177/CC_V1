# pytest.ini - Pytest configuration

[pytest]
DJANGO_SETTINGS_MODULE = hostelconnect.settings.base
python_files = tests.py test_*.py *_tests.py conftest.py pytest_fixtures.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --tb=short
    --cov=apps
    --cov=hostelconnect
    --cov-report=html
    --cov-report=term-missing
    --cov-report=json
    --cov-fail-under=80
    -v
testpaths = apps tests
norecursedirs = .git .tox build dist *.egg venv node_modules htmlcov
markers =
    unit: fast tests for pure business logic and helpers.
    integration: tests covering DB interactions and cross-service behavior.
    slow: tests that take a long time to run.
    smoke: quick smoke tests for critical paths.
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    api: HTTP API tests using requests against a live Django server.
    ui: browser-based UI tests using Playwright Python.
    e2e: end-to-end scenario tests.
