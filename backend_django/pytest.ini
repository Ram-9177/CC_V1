# pytest.ini - Pytest configuration

[pytest]
DJANGO_SETTINGS_MODULE = hostelconnect.settings.base
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --tb=short
    --cov=apps
    --cov=hostelconnect
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=50
testpaths = tests
norecursedirs = .git .tox build dist *.egg venv node_modules
