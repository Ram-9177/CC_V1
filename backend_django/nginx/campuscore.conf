upstream django_api {
    server 127.0.0.1:8000;
    server 127.0.0.1:8001;
    server 127.0.0.1:8002;
    server 127.0.0.1:8003;
    keepalive 128;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# API host: API/WS only.
server {
    listen 80;
    server_name api.samuraitechpark.in;

    client_max_body_size 20m;

    location ^~ /admin/ {
        return 308 http://samuraitechpark.in$request_uri;
    }

    location /api/ {
        proxy_pass http://django_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    location /ws/ {
        rewrite ^/ws/ws/(.*)$ /ws/$1 break;
        proxy_pass http://django_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }

    location / {
        return 404;
    }
}

# Web/Admin host.
server {
    listen 80;
    server_name samuraitechpark.in www.samuraitechpark.in;

    client_max_body_size 20m;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
      text/plain
      text/css
      application/json
      application/javascript
      application/xml
      text/xml
      image/svg+xml;

    location /static/ {
        alias /var/www/campuscore/static/;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /media/ {
        alias /var/www/campuscore/media/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /ws/ {
        rewrite ^/ws/ws/(.*)$ /ws/$1 break;
        proxy_pass http://django_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }

    location / {
        proxy_pass http://django_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}
