    <meta name="format-detection" content="telephone=no" />
    <!-- Legacy Browser Compatibility Check -->
    <script>
      (function() {
        var isModern = 'Symbol' in window && 'Promise' in window && 'assign' in Object;
        if (!isModern) {
          document.documentElement.className += ' is-legacy-browser';
          console.warn('Campus Core: Legacy browser detected. Performance may be degraded.');
          // Optional: Add a subtle hint on UI if really ancient
        }
      })();
    </script>
    <style>
      .is-legacy-browser .premium-blur { backdrop-filter: none !important; -webkit-backdrop-filter: none !important; }
      .is-legacy-browser .animate-spin, .is-legacy-browser .animate-pulse { animation: none !important; }
    </style>
    <title>Campus Core | Smart Management</title>
  </head>
  <body>
    <!-- Premium Branded Splash Loader (Visible during initial JS load) -->
    <div id="root">
        <style>
          #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #fff; z-index: 9999; font-family: 'Sora', sans-serif;
          }
          .splash-brand-image { width: min(92vw, 560px); height: auto; object-fit: contain; }
          .splash-bar {
            width: 140px; height: 4px; background: #f0f0f0; border-radius: 2px; margin-top: 16px; overflow: hidden;
          }
          .splash-progress {
            width: 40%; height: 100%; background: linear-gradient(90deg, #4B5DEE, #7C8EF5);
            border-radius: 2px; animation: splash-progress 1.5s infinite ease-in-out;
          }
          @keyframes splash-progress {
            0% { transform: translateX(-100%); width: 20%; }
            50% { width: 60%; }
            100% { transform: translateX(200%); width: 20%; }
          }
        </style>
        <div id="splash-screen">
          <img src="/brand-wordmark.png" class="splash-brand-image" alt="Campus Core" fetchpriority="high" />
          <div class="splash-bar"><div class="splash-progress"></div></div>
        </div>
    </div>
    
    <!-- Console Noise Suppressor (Suppresses external script/extension/PWA noise) -->
    <script>
      (function() {
        const suppress = (method) => {
          const original = console[method];
          const filteredPaths = ['load_embeds.js', 'embed_script.js', 'extensionService', 'chrome-extension://'];
          const filteredMessages = ['message port closed', 'The message port closed', 'beforeinstallprompt', 'Banner not shown'];
          
          console[method] = function() {
            const args = Array.from(arguments);
            const content = args.map(arg => typeof arg === 'string' ? arg : JSON.stringify(arg)).join(' ');
            const isNoise = filteredPaths.some(p => content.includes(p)) || 
                            filteredMessages.some(m => content.includes(m));
            if (!isNoise) original.apply(console, args);
          };
        };
        ['log', 'error', 'warn', 'info', 'debug'].forEach(suppress);
        
        window.addEventListener('error', function(event) {
          const filteredPaths = ['load_embeds.js', 'embed_script.js', 'extensionService'];
          if (event.filename && filteredPaths.some(p => event.filename.includes(p))) {
            event.stopImmediatePropagation();
          }
        }, true);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
