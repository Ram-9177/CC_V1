services:
  # ==========================================
  # 1. BACKEND SERVICE (Django + Channels)
  # ==========================================
  - type: web
    name: campuscore-api
    plan: free
    rootDir: backend_django
    env: python
    buildCommand: ./build.sh
    preDeployCommand: python manage.py migrate
    startCommand: gunicorn hostelconnect.asgi:application -k uvicorn.workers.UvicornWorker --workers 2 --threads 2 --timeout 60 --keep-alive 5 --max-requests 500 --max-requests-jitter 50 --log-level warning --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health/
    envVars:
      - key: DEBUG
        value: false
      - key: RENDER
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: campuscore-db
          property: connectionString
      - key: REDIS_URL
        sync: false
        value: rediss://default:gQAAAAAAARI9AAIncDFhYzA0NGRjNTc2NTQ0ZWJmYTAxNzRkOWM3OWMxMmM3NXAxNzAyMDU@fleet-opossum-70205.upstash.io:6379
      - key: UPSTASH_REDIS_REST_URL
        sync: false
        value: https://fleet-opossum-70205.upstash.io
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
        value: gQAAAAAAARI9AAIncDFhYzA0NGRjNTc2NTQ0ZWJmYTAxNzRkOWM3OWMxMmM3NXAxNzAyMDU
      - key: ALLOWED_HOSTS
        value: "campuscore-api.onrender.com,samuraitechpark.in,www.samuraitechpark.in,www.api.samuraitechpark.in"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://campuscore-web.onrender.com,https://samuraitechpark.in,https://www.samuraitechpark.in"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://campuscore-web.onrender.com,https://samuraitechpark.in,https://www.samuraitechpark.in"
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 2 # Reduced for Free Tier memory stability to prevent slowdowns
      - key: DB_CONN_MAX_AGE
        value: 30 # Keep DB sockets warm but avoid long-held idle connections
      - key: DB_STATEMENT_TIMEOUT_MS
        value: 5000 # Protect free-tier DB from long blocking queries
      - key: SLOW_QUERY_THRESHOLD_MS
        value: 700 # Log only meaningful slow queries in production
      - key: USE_IN_MEMORY_CHANNEL_LAYER
        value: false
      # Channels Configuration (Environment variables for easy scaling)
      - key: CHANNELS_CAPACITY
        value: 5000 # Free: 5000, Pro: change to 20000
      - key: CHANNELS_MAX_CONNECTIONS
        value: 50 # Free: 50, Pro: change to 200
      # Cache Configuration
      - key: CACHE_MAX_CONNECTIONS
        value: 25 # Free: 25, Pro: change to 100
      - key: CACHE_VERSION
        value: 1
      # Timeout for slow network connections
      - key: CHANNELS_SOCKET_TIMEOUT
        value: 20 # Free: 20s, Pro: can reduce to 10s
  # ==========================================
  # 2. FRONTEND SERVICE (React + Vite)
  # ==========================================
  - type: web
    name: campuscore-web
    plan: free
    rootDir: .
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "/api"
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: campuscore-api
          property: url
      # VITE_WS_URL is auto-derived from VITE_API_URL in src/lib/websocket.ts

    routes:
      - type: rewrite
        source: /api/*
        destination: https://www.api.samuraitechpark.in/api/*
      - type: rewrite
        source: /ws/*
        destination: https://www.api.samuraitechpark.in/ws/*
      - type: rewrite
        source: /admin/*
        destination: https://www.api.samuraitechpark.in/admin/*
      - type: rewrite
        source: /media/*
        destination: https://www.api.samuraitechpark.in/media/*
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  # ==========================================
  # 3. DATABASE (PostgreSQL)
  # ==========================================
  - name: campuscore-db
    plan: free
    maxConnections: 3 # Hard limit for free tier
    postgresMajorVersion: 14

envVarGroups:
  - name: global-settings
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
