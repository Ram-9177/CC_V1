services:
  # ==========================================
  # 1. BACKEND SERVICE (Django + Channels)
  # ==========================================
  - type: web
    name: hostelconnect-api
    plan: free
    rootDir: backend_django
    env: python
    buildCommand: ./build.sh
    startCommand: daphne -b 0.0.0.0 -p $PORT -u $WEB_CONCURRENCY hostelconnect.asgi:application
    healthCheckPath: /api/health/
    envVars:
      - key: DEBUG
        value: false
      - key: RENDER
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: hostelconnect-db
          property: connectionString
      - key: REDIS_URL
        sync: false
        value: redis://... # MANUAL STEP: Update this with Upstash URL after creating service
      - key: ALLOWED_HOSTS
        value: "hostelconnect-api.onrender.com,hostel.samuraitechpark.in,www.hostel.samuraitechpark.in,api.hostel.samuraitechpark.in"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://hostelconnect-web.onrender.com,https://hostel.samuraitechpark.in,https://www.hostel.samuraitechpark.in"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://hostelconnect-web.onrender.com,https://hostel.samuraitechpark.in,https://www.hostel.samuraitechpark.in"
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 2 # Reduced for Free Tier memory stability to prevent slowdowns
      - key: USE_IN_MEMORY_CHANNEL_LAYER
        value: false
      # Channels Configuration (Environment variables for easy scaling)
      - key: CHANNELS_CAPACITY
        value: 5000 # Free: 5000, Pro: change to 20000
      - key: CHANNELS_MAX_CONNECTIONS
        value: 50 # Free: 50, Pro: change to 200
      # Cache Configuration
      - key: CACHE_MAX_CONNECTIONS
        value: 25 # Free: 25, Pro: change to 100
      # Timeout for slow network connections
      - key: CHANNELS_SOCKET_TIMEOUT
        value: 20 # Free: 20s, Pro: can reduce to 10s
  # ==========================================
  # 2. FRONTEND SERVICE (React + Vite)
  # ==========================================
  - type: web
    name: hostelconnect-web
    plan: free
    rootDir: .
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "/api"
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: hostelconnect-api
          property: url
      # VITE_WS_URL is auto-derived from VITE_API_URL in src/lib/websocket.ts

    routes:
      - type: rewrite
        source: /api/*
        destination: https://hostelconnect-api.onrender.com/api/*
      - type: rewrite
        source: /ws/*
        destination: https://hostelconnect-api.onrender.com/ws/*
      - type: rewrite
        source: /admin/*
        destination: https://hostelconnect-api.onrender.com/admin/*
      - type: rewrite
        source: /media/*
        destination: https://hostelconnect-api.onrender.com/media/*
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  # ==========================================
  # 3. DATABASE (PostgreSQL)
  # ==========================================
  - name: hostelconnect-db
    plan: free
    maxConnections: 3 # Hard limit for free tier
    postgresMajorVersion: 14

envVarGroups:
  - name: global-settings
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
