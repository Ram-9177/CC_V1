<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline</title>
    <style>
      body{margin:0;font-family:system-ui;background:#FFFDF1;color:#562F00;display:flex;min-height:100vh;align-items:center;justify-content:center}
      .card{max-width:420px;padding:24px;border-radius:16px;background:#fff;border:1px solid rgba(255,150,68,0.30);box-shadow:0 10px 30px rgba(86,47,0,0.12)}
      h1{margin:0 0 8px 0;font-size:20px}
      p{margin:0;color:rgba(86,47,0,0.72)}
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You’re offline</h1>
      <p>Reconnect to sync live data. Cached screens may still be available.</p>
    </div>
