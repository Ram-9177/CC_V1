name = "hostel-connect-pages"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# Runtime env variables will be set in Cloudflare Dashboard for production.
# Updated to MongoDB Driver (Data API deprecated September 2025)
MONGODB_CONNECTION_STRING = ""
MONGODB_DATABASE = ""
JWT_SECRET = ""
ADMIN_EMAIL = ""
ADMIN_PASSWORD = ""

[pages]
# Cloudflare Pages build output dir
pages_build_output_dir = "build"
