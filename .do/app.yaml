spec:
  name: hostelconnect
  services:
    - name: hostelconnect-backend
      github:
        repo: <YOUR_GITHUB_USERNAME>/SMG-Hostel
        branch: main
        deploy_on_push: true
      source_dir: backend
      dockerfile_path: Dockerfile
      http_port: 3000
      instance_count: 1
      instance_size_slug: basic-xxs
      envs:
        # Set secrets in DO App Platform dashboard
        - key: NODE_ENV
          value: production
        - key: PORT
          value: "3000"
        - key: DATABASE_URL
          value: ${DATABASE_URL}
        - key: JWT_SECRET
          value: ${JWT_SECRET}
    
  static_sites:
    - name: hostelconnect-frontend
      github:
        repo: <YOUR_GITHUB_USERNAME>/SMG-Hostel
        branch: main
        deploy_on_push: true
      source_dir: .
      build_command: npm ci && npm run build
      output_dir: build
      environment_slug: node-js
      envs:
        - key: VITE_API_URL
          value: https://api.hostel.samuraitechpark.in
      routes:
        - path: /
          preserve_path_prefix: true

  databases:
    - engine: PG
      name: hostelconnect-db
      num_nodes: 1
      size: db-s-dev-database
      version: "14"
