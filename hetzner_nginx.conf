# Hetzner CX33 Optimized Nginx Configuration for CampusCore
# Place this in /etc/nginx/sites-available/campuscore

server {
    listen 80;
    listen [::]:80;
    server_name _;
    
    # HTTP/2 is enabled via listen 443 ssl http2;
    # Add your SSL configuration here

    # GZIP Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Keepalive & Network 
    keepalive_timeout 65;
    keepalive_requests 1000;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Static file caching
    location /static/ {
        alias /path/to/backend_django/staticfiles/;
        expires 365d;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy to Gunicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Enable Keepalive to Upstream
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
