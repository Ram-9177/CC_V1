name: Release PWA Zip

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Zip build
        run: |
          cd build
          zip -r ../hostelconnect-pwa.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hostelconnect-pwa
          path: hostelconnect-pwa.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: hostelconnect-pwa.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
