name: Run Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend_django/**'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend_django/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: hostelconnect_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:6
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend_django/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        cd backend_django
        python -m pip install --upgrade pip
        pip install -r requirements.txt -r requirements-dev.txt
    
    - name: Run linting (non-blocking)
      run: |
        cd backend_django
        pip install flake8 black
        flake8 apps/ hostelconnect/ --count --select=E9,F63,F7,F82 --show-source --statistics || echo "flake8 failed (non-blocking in CI)"
        black --check apps/ hostelconnect/ || true
    
    - name: Run migrations
      env:
        DEBUG: 'False'
        SECRET_KEY: 'test-secret-key'
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: hostelconnect_test
        DB_USERNAME: postgres
        DB_PASSWORD: postgres
        REDIS_URL: redis://localhost:6379/0
      run: |
        cd backend_django
        python manage.py migrate
    
    - name: Run tests
      env:
        DEBUG: 'False'
        SECRET_KEY: 'test-secret-key'
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: hostelconnect_test
        DB_USERNAME: postgres
        DB_PASSWORD: postgres
        REDIS_URL: redis://localhost:6379/0
        USE_IN_MEMORY_CHANNEL_LAYER: 'True'
      run: |
        cd backend_django
        pytest tests/ -v --cov --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        files: ./backend_django/coverage.xml
        flags: unittests
        fail_ci_if_error: false
    
    - name: Comment PR with test results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '✅ Tests passed successfully!'
          })

  deploy:
    needs: [test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v3

      - name: Run Deployment Script
        shell: bash
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
          RENDER_SERVICE_URL: ${{ secrets.RENDER_SERVICE_URL }}
        run: |
          set -e

          # Deployment
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            echo "🚀 Triggering Render deployment..."
            curl -X POST "$RENDER_DEPLOY_HOOK" && echo "" && echo "✅ Deployment triggered"
            sleep 30
          else
            echo "⚠️ Render deployment hook not configured"
          fi

          # Health Check
          if [ -n "$RENDER_SERVICE_URL" ]; then
            echo "🔍 Checking service health..."
            for attempt in {1..5}; do
              status=$(curl -s -o /dev/null -w "%{http_code}" "https://$RENDER_SERVICE_URL/api/health/" 2>/dev/null || echo "000")
              if [ "$status" = "200" ]; then
                echo "✅ Service is healthy"
                exit 0
              fi
              if [ $attempt -lt 5 ]; then
                echo "⏳ Attempt $attempt/5 - Status: $status"
                sleep 5
              fi
            done
            echo "⚠️ Health check incomplete"
          else
            echo "⚠️ Service URL not configured"
          fi
