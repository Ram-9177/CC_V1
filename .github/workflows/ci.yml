name: Production Readiness CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main]

jobs:
  test_and_audit:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: hostel_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Install Backend Dependencies
        run: |
          cd backend_django
          pip install -r requirements.txt

      - name: Run Backend Tests (Unit/Integrity)
        run: |
          cd backend_django
          python manage.py test

      - name: Start Backend
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/hostel_db
          SECRET_KEY: ci-secret-key
          DEBUG: True
        run: |
          cd backend_django
          python manage.py migrate
          python manage.py runserver 8000 &
          echo "Waiting for backend..."
          npx wait-on http://localhost:8000/api/health/ --timeout 60000

      - name: Run E2E Tests (Playwright)
        run: npm run test:all -- --project=chromium

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            playwright-report/
            test-results/
          retention-days: 30

      - name: Run Security Audit (npm)
        run: npm audit --audit-level=high

      - name: Run k6 Load Test (Smoke Test)
        uses: grafana/setup-k6-action@v1
      - run: k6 run testing/load/load_test.js --env API_URL=http://localhost:8000/api
