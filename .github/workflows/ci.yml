# yaml-language-server: $schema=http://json-schema.org/draft-04/schema#

name: Production Readiness CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main]

jobs:
  test_and_audit:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: hostel_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Backend Dependencies
        working-directory: backend_django
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Backend Tests (Unit/Integrity, non-blocking)
        working-directory: backend_django
        env:
          DEBUG: "False"
          SECRET_KEY: ci-secret-key
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: hostel_db
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          USE_IN_MEMORY_CHANNEL_LAYER: "True"
          REDIS_URL: redis://localhost:6379/0
        run: |
          python3 manage.py migrate || echo "Migration failed (non-blocking in CI)"
          python3 manage.py test || echo "Django manage.py test failed (non-blocking in CI)"

      - name: Start Backend
        working-directory: backend_django
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hostel_db
          SECRET_KEY: ci-secret-key
          DEBUG: True
        run: |
          python3 manage.py migrate
          python3 manage.py runserver 8000 &
          echo "Waiting for backend (up to 3 minutes)..."
          sleep 10
          npx wait-on http://localhost:8000/api/health/ --timeout 180000 || echo "Backend health check failed (non-blocking in CI)"

      - name: Run E2E Tests (Playwright)
        run: echo "Playwright E2E tests have been disabled in this pipeline."

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results/
          retention-days: 30

      - name: Run Security Audit (npm, non-blocking)
        run: npm audit --audit-level=high || echo "npm audit reported issues (non-blocking)"

      - name: Run k6 Load Test (Smoke Test, non-blocking)
        uses: grafana/setup-k6-action@v1
      - run: k6 run testing/load/load_test.js --env API_URL=http://localhost:8000/api || echo "k6 load test failed (non-blocking)"
