name: Keep-Alive Pings

on:
  schedule:
    - cron: "*/5 * * * *" # Every 5 minutes (Github Actions minimum)
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API
        run: curl -I https://hostelconnect-api.onrender.com/api/health/ping/
      - name: Ping Frontend
        run: curl -I https://www.samuraitechpark.in/
