name: Deploy Backend to Render (manual)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Deployment Script
        shell: bash
        env:
          HOOK_URL: ${{ secrets['RENDER_DEPLOY_HOOK'] }}
          HEALTH_URL: ${{ secrets['RENDER_BACKEND_URL'] }}
        run: |
          set -e
          if [ -n "$HOOK_URL" ]; then
            echo "🚀 Triggering Render deployment..."
            curl -X POST "$HOOK_URL" && echo "" && echo "✅ Deployment triggered"
            sleep 30
          else
            echo "⚠️ Render deployment hook not configured"
          fi
          if [ -n "$HEALTH_URL" ]; then
            echo "🔍 Checking service health at $HEALTH_URL..."
            for attempt in {1..5}; do
              status=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL/api/health/" 2>/dev/null || echo "000")
              if [ "$status" = "200" ]; then
                echo "✅ Service is healthy"
                exit 0
              fi
              if [ $attempt -lt 5 ]; then
                echo "⏳ Attempt $attempt/5 - Status: $status"
                sleep 5
              fi
            done
            echo "⚠️ Health check incomplete"
          else
            echo "⚠️ Service URL not configured"
          fi
