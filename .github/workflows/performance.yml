name: 🚀 Performance Benchmark (TTFB)

# ─────────────────────────────────────────────────────────────────────────────
# WHEN THIS RUNS
# ─────────────────────────────────────────────────────────────────────────────
#
# • On every push to main (standard regression gate)
# • Manually via GitHub UI (Actions → Run workflow) for on-demand checks
#
# To SKIP in an emergency (e.g. Render infra outage):
#   Set the repository variable SKIP_PERF_BENCHMARK to "true"
#   (Settings → Actions → Variables → Repository variables)
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub UI
    inputs:
      base_url:
        description: "Override BASE_URL (leave blank to use secret)"
        required: false
        default: ""
      threshold:
        description: "TTFB threshold in seconds (default: 1.0)"
        required: false
        default: "1.0"

jobs:
  benchmark:
    name: TTFB Benchmark
    runs-on: ubuntu-latest

    # Emergency kill-switch: Set SKIP_PERF_BENCHMARK=true as a Repository Variable
    # to disable without editing this file (useful during planned infra maintenance).
    if: ${{ vars['SKIP_PERF_BENCHMARK'] != 'true' }}

    env:
      RENDER_BACKEND_URL: ${{ vars['RENDER_BACKEND_URL'] }}
      # Combine inputs and secrets/vars at the job level for cleaner steps
      THRESHOLD: ${{ github.event.inputs.threshold || '1.0' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify curl availability
        run: |
          curl --version
          awk --version | head -1

      - name: Set script permissions
        run: chmod +x backend/bench_ttfb.sh

      - name: Run TTFB Benchmark
        env:
          # Manual override takes priority over stored variable
          BASE_URL: ${{ github.event.inputs.base_url || env.RENDER_BACKEND_URL }}
          MAX_RETRIES: "2"
          RETRY_DELAY: "3"
        run: |
          echo "──────────────────────────────────────────────"
          echo "  Commit : ${{ github.sha }}"
          echo "  Branch : ${{ github.ref_name }}"
          echo "  Actor  : ${{ github.actor }}"
          echo "──────────────────────────────────────────────"

          # Skip gracefully if BASE_URL is missing
          if [[ -z "$BASE_URL" ]]; then
            echo "⚠️ RENDER_BACKEND_URL variable not configured – skipping TTFB benchmark."
            exit 0
          fi

          ./backend/bench_ttfb.sh

      - name: Save performance log
        if: always()
        env:
          BASE_URL: ${{ github.event.inputs.base_url || env.RENDER_BACKEND_URL }}
        run: |
          mkdir -p perf-logs
          {
            echo "# TTFB Benchmark Report"
            echo "date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "commit: ${{ github.sha }}"
            ./backend/bench_ttfb.sh 2>&1 || true
          } > perf-logs/ttfb-report-$(date -u +%Y%m%d-%H%M%S).txt

      - name: Upload performance log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ttfb-report-${{ github.sha }}
          path: perf-logs/
          retention-days: 30
