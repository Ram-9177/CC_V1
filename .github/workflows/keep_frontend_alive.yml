name: Keep Frontend Service Awake

on:
  schedule:
    # Run every 5 minutes to handle GitHub scheduling delays
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping_frontend:
    runs-on: ubuntu-latest
    env:
      RENDER_FRONTEND_URL: ${{ secrets.RENDER_FRONTEND_URL }}
    steps:
      - name: CHECK Frontend Health
        run: |
          if [ -z "${RENDER_FRONTEND_URL:-}" ]; then
            echo "RENDER_FRONTEND_URL variable not set. Skipping ping."
            exit 0
          fi

          echo "Pinging ${RENDER_FRONTEND_URL}/ ..."
          # -L: Follow redirects (HTTP -> HTTPS)
          # -s: Silent
          # -o: Discard body
          # -w: Output HTTP code
          response=$(curl -L -s -o /dev/null -w "%{http_code}" "${RENDER_FRONTEND_URL}/")

          if [ "$response" = "200" ]; then
            echo "Success: Frontend is awake (HTTP 200)"
          else
            echo "Warning: Frontend returned HTTP $response"
          fi
