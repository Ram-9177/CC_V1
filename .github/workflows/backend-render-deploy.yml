name: Backend Deploy (Render)

on:
  push:
    branches: [ main ]
    paths:
      - 'backend_django/**'
      - '.github/workflows/backend-render-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook (if configured)
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK:-}" ]; then
            echo "RENDER_DEPLOY_HOOK not set; skipping deploy trigger."
            exit 0
          fi

          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK" || echo "Render deploy hook failed"
