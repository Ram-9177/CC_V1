name: Backend Deploy (Render)

on:
  push:
    branches: [ main ]
    paths:
      - 'backend_django/**'
      - '.github/workflows/backend-render-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook (if configured)
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        # Use the secrets context directly in the condition to satisfy
        # static validators; the value is still passed into the script via env.
        if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
        run: |
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK" || echo "Render deploy hook failed"
