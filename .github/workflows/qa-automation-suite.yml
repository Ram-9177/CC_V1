name: QA Automation Suite

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      SECRET_KEY: ci-secret-key
      DEBUG: "False"
      USE_SQLITE: "True"
      USE_IN_MEMORY_CHANNEL_LAYER: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend_django/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend_django/requirements.txt

      - name: Run migrations
        working-directory: backend_django
        run: python manage.py migrate --noinput

      - name: Run unit/integration/api tests
        working-directory: backend_django
        run: |
          mkdir -p test-results
          pytest tests \
            -m "not ui" \
            --junitxml=test-results/backend-junit.xml \
            --cov-report=xml:test-results/coverage.xml \
            --cov-report=html:test-results/htmlcov

      - name: Upload backend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-artifacts
          path: |
            backend_django/test-results/
            backend_django/htmlcov/
          if-no-files-found: ignore

  ui-tests:
    runs-on: ubuntu-latest
    needs: backend-tests
    env:
      PYTHONUNBUFFERED: "1"
      SECRET_KEY: ci-secret-key
      DEBUG: "False"
      USE_SQLITE: "True"
      USE_IN_MEMORY_CHANNEL_LAYER: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      BASE_URL: http://127.0.0.1:5173
      E2E_HALL_TICKET: STUDENT1
      E2E_PASSWORD: password123

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend_django/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend_django/requirements.txt
          pip install pytest-playwright playwright

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Prepare backend test data
        working-directory: backend_django
        run: |
          rm -f db.sqlite3
          python manage.py migrate --noinput
          python manage.py seed_test_users

      - name: Start backend server
        working-directory: backend_django
        run: nohup python manage.py runserver 0.0.0.0:8000 > ../backend.log 2>&1 &

      - name: Start frontend server
        run: nohup npm run dev -- --host 0.0.0.0 --port 5173 > frontend.log 2>&1 &

      - name: Wait for services
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8000/api/health/ > /dev/null; then
              break
            fi
            sleep 2
          done

          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:5173 > /dev/null; then
              break
            fi
            sleep 2
          done

          curl -fsS http://127.0.0.1:8000/api/health/ > /dev/null
          curl -fsS http://127.0.0.1:5173 > /dev/null

      - name: Run Playwright UI tests (Python)
        working-directory: backend_django
        run: |
          mkdir -p test-results
          pytest -o addopts="--strict-markers --tb=short" tests/ui \
            -m "ui and e2e" \
            --junitxml=test-results/ui-junit.xml

      - name: Upload UI test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-artifacts
          path: |
            backend_django/test-results/
            backend.log
            frontend.log
          if-no-files-found: ignore
