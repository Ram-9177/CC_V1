name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: hostelconnect_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d hostelconnect_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Build
        run: npm run build
      - name: Run unit tests
        run: npm run test --silent
      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U test; do
            echo "waiting for postgres..."
            sleep 1
          done
        env:
          PGPASSWORD: test
      - name: Run migrations
        run: npm run migrate:run
      - name: Run e2e tests
        run: npm run test:e2e --silent
